<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evento Georgia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
radial-gradient(circle at top,#252525,#050505 60%);

color:white;

}



/* CONTAINER 3D */

.area{

perspective:1500px;

}



.card{


width:430px;

padding:35px;

background:

linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.02)
);


border:1px solid rgba(255,255,255,.15);


border-radius:30px;


backdrop-filter:blur(15px);


box-shadow:

0 40px 100px rgba(0,0,0,.8);


text-align:center;


transform-style:preserve-3d;


transition:.4s ease;


}



/* topo */


.label{

font-size:12px;

letter-spacing:5px;

color:#aaa;

margin-bottom:20px;

}



h1{

font-size:34px;

font-weight:800;

line-height:1.2;

}



.texto{

margin-top:15px;

color:#aaa;

font-size:15px;

}



/* imagem */


.imagem{

margin:30px 0;

}



.imagem img{


width:100%;


height:240px;


object-fit:cover;


border-radius:22px;


filter:

brightness(.75)
contrast(1.1);


}



/* PREÇO */


.preco{


margin:25px 0;


animation:

flutuar 2.5s infinite;


}



.preco .moeda{


font-size:25px;

}



.preco strong{


display:block;


font-size:95px;


font-weight:800;


line-height:1;


background:

linear-gradient(
90deg,
#fff,
#777,
#fff
);


background-size:200%;


background-clip: text;


color:transparent;


animation:

luz 2s linear infinite;



}



@keyframes flutuar{


50%{

transform:translateY(-10px);

}

}



@keyframes luz{


100%{

background-position:200%;

}

}



/* BOTÃO */


.btn{


display:block;


padding:18px;


background:white;


color:black;


border-radius:50px;


font-weight:800;


text-decoration:none;


letter-spacing:1px;


transition:.4s;


}


.btn:hover{


transform:translateY(-5px);


box-shadow:

0 20px 50px rgba(255,255,255,.25);


}



/* segurança */


.seguro{


margin-top:25px;


font-size:12px;


color:#777;


}




@media(max-width:500px){


.card{

width:90%;

padding:25px;

}


h1{

font-size:27px;

}


.preco strong{

font-size:70px;

}


}



</style>


</head>



<body>



<div class="area">


<div class="card">



<div class="label">

EVENTO PREMIUM

</div>



<h1>

Uma experiência criada para transformar

</h1>



<p class="texto">

Um encontro exclusivo para pessoas que buscam evolução, propósito e novas decisões.

</p>




<div class="imagem">

<img src="img/evento1.jpg">

</div>




<div class="preco">


<span class="moeda">

R$

</span>


<strong>

97

</strong>


</div>




<a href="SEU_LINK_HOTMART" class="btn">

GARANTIR MINHA VAGA

</a>



<div class="seguro">

🔒 Pagamento seguro • Confirmação imediata

</div>



</div>


</div>




<script>


const card=document.querySelector(".card");


document.addEventListener("mousemove",(e)=>{


const x=(window.innerWidth / 2 - e.clientX)/35;

const y=(window.innerHeight / 2 - e.clientY)/35;


card.style.transform =
`
rotateY(${x}deg)
rotateX(${y}deg)
`;



});



</script>


</body>

</html>
